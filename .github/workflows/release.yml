name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create mod-client.zip
        run: |
          zip -r niponmon-client.zip niponmon-client

      - name: Create mod-server.zip
        run: |
          zip -r niponmon-server.zip niponmon-server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            niponmon-client.zip
            niponmon-server.zip
