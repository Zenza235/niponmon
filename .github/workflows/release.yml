name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create client modpack zip
        run: |
          cd niponmon-client
          zip -r ../niponmon-client.zip .

      - name: Create server modpack zip
        run: |
          cd niponmon-server
          zip -r ../niponmon-server.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            niponmon-client.zip
            niponmon-server.zip
